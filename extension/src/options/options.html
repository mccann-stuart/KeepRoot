<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeepRoot Settings</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <link rel="stylesheet" href="../styles/options.css">
</head>
<body>

  <main class="settings-shell">
    <section class="settings-card">
      <header class="settings-header">
        <p class="settings-header__eyebrow">KeepRoot</p>
        <h1>Extension Configuration</h1>
        <p>Connect the extension to your deployed Worker root URL and API key.</p>
      </header>

      <form id="settings-form">
        <div class="form-group">
          <label for="workerUrl">Cloudflare Worker URL</label>
          <input 
            type="url" 
            id="workerUrl" 
            class="input-control" 
            placeholder="https://backend.<your-username>.workers.dev" 
            required 
          />
          <p class="form-hint">
            Enter the Worker root URL only. Do not include paths like <code>/bookmarks</code>.
          </p>
        </div>

        <div class="form-group">
          <label for="apiSecret">API Key</label>
          <input
            type="password"
            id="apiSecret"
            class="input-control"
            placeholder="Paste the API key from the KeepRoot dashboard"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="save-btn">
          Save Settings
        </button>

        <div id="status-message" class="status-msg text-center"></div>
      </form>
    </section>
  </main>

  <script src="../../dist/options.js"></script>
</body>
</html>
