<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeepRoot Settings</title>
  <link rel="stylesheet" href="../styles/theme.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    
    .settings-card {
      background-color: var(--surface);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
      border: 1px solid var(--border);
    }

    .settings-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .settings-header h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .settings-header p {
      font-size: 0.875rem;
    }

    .btn-block {
      width: 100%;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="settings-card">
    <div class="settings-header">
      <h1>KeepRoot Configuration</h1>
      <p>Connect your self-hosted Cloudflare Worker root URL</p>
    </div>

    <form id="settings-form">
      <div class="form-group">
        <label for="workerUrl">Cloudflare Worker URL</label>
        <input 
          type="url" 
          id="workerUrl" 
          class="input-control" 
          placeholder="https://backend.<your-username>.workers.dev" 
          required 
        />
        <p style="font-size: 0.875rem; margin-top: 0.5rem;">
          Enter the Worker root URL only. Do not include paths like <code>/bookmarks</code>.
        </p>
      </div>

      <div class="form-group">
        <label for="apiSecret">API Secret</label>
        <input
          type="password"
          id="apiSecret"
          class="input-control"
          placeholder="Enter your secure token"
          required
        />
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="save-btn">
        Save Settings
      </button>

      <div id="status-message" class="status-msg text-center"></div>
    </form>
  </div>

  <script src="options.js"></script>
</body>
</html>
